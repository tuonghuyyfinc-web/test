document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

><div class=\"ds\">Chiêu chơi đùa hung dữ hệ Tiên — có thể giảm Tấn công đối thủ.<\u002Fdiv><\u002Fdiv><div class=\"lv\">LV<b>45<\u002Fb><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ JOURNEY ============ -->\n<section class=\"journey\" id=\"journey\">\n  <div class=\"journey-stick\">\n    <div class=\"journey-title\">\n      <div class=\"section-label lbl\"><span class=\"sq\"><\u002Fspan>CHƯƠNG 04 · CÂU CHUYỆN<\u002Fdiv>\n      <h2 class=\"display\">Cuộc sống<br>ở <em style=\"color:var(--accent);font-style:italic\">vùng Galar<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"journey-track\" id=\"jTrack\">\n      <div class=\"journey-card\">\n        <div class=\"idx mono\">0 1 / 0 5<\u002Fdiv>\n        <h3>Người bạn của chăn cừu<\u002Fh3>\n        <p>Ở vùng Galar, Wanpachi được những người chăn cừu yêu quý vì thường giúp lùa cừu. Chúng có thể đuổi theo đàn vật suốt cả ngày mà không mệt.<\u002Fp>\n        <div class=\"drop j-drop\" data-slot=\"j1\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh 01<\u002Fdiv><div class=\"s\">GALAR · CHĂN CỪU<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"journey-card\">\n        <div class=\"idx mono\">0 2 / 0 5<\u002Fdiv>\n        <h3>Điện sinh ra từ bước chân<\u002Fh3>\n        <p>Một cơ quan đặc biệt trong cơ thể Wanpachi tạo ra điện mỗi khi nó chạy. Vì thế, khi ngồi yên, nó không thể dự trữ điện được.<\u002Fp>\n        <div class=\"drop j-drop\" data-slot=\"j2\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh 02<\u002Fdiv><div class=\"s\">ĐANG CHẠY · TIA LỬA<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"journey-card\">\n        <div class=\"idx mono\">0 3 / 0 5<\u002Fdiv>\n        <h3>Đuôi hình tia chớp<\u002Fh3>\n        <p>Đuôi của Wanpachi c yle=\"color:var(--accent);font-style:italic\">từng ô<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n    <p>Mỗi ô đều là một khung upload độc lập — click hoặc kéo thả ảnh của bạn. Ảnh sẽ được lưu trong phiên trình duyệt.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"gal-grid\">\n    <div class=\"drop g1\" data-slot=\"g1\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh lớn<\u002Fdiv><div class=\"s\">KEY VISUAL<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g2\" data-slot=\"g2\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh<\u002Fdiv><div class=\"s\">02<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g3\" data-slot=\"g3\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh<\u002Fdiv><div class=\"s\">03<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g4\" data-slot=\"g4\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh<\u002Fdiv><div class=\"s\">04<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g5\" data-slot=\"g5\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh<\u002Fdiv><div class=\"s\">05<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g6\" data-slot=\"g6\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh<\u002Fdiv><div class=\"s\">06<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g7\" data-slot=\"g7\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh ngang<\u002Fdiv><div class=\"s\">07<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"drop g8\" data-slot=\"g8\"><input type=\"file\" accept=\"image/*\"><div class=\"hint\"><div class=\"ic\">⤴<\u002Fdiv><div class=\"t\">Ảnh ngang<\u002Fdiv><div class=\"s\">08<\u002Fdiv><\u002Fdiv><button class=\"clear\">×<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CTA ============ -->\n<section class=\"cta\" id=\"cta\">\n  <div class=\"orb o1\"><\u002Fdiv>\n  <div class=\"orb o2\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;text-align:center;\">\n    <div class=\"section-label\" style=\"justify-content:center;color:rgba(255,255,255,.5);margin-bottom:20px;\"><span class=\"sq\"><\u002Fspan>WANPACHI · ワンパチ<\u002Fdiv>\n    <div class=\"huge\">Cùng <em>chạy<\u002Fem><br>với Wanpachi!<\u002Fdiv>\n    <div class=\"sub\">Một trang hồ sơ fan-made về Wanpachi / Yamper. Thả ảnh của bạn vào các ô upload để trang trở nên hoàn chỉnh — không có ảnh nào bị gửi đi đâu cả, chỉ xem cục bộ trong trình duyệt.<\u002Fdiv>\n    <button class=\"btn\" onclick=\"window.scrollTo({top:0,behavior:'smooth'})\">↑ QUAY LẠI ĐẦU<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div>© 2026 · WANPACHI TRIBUTE · FAN PROJECT · POKÉMON © NINTENDO / GAME FREAK<\u002Fdiv>\n  <div>UPLOAD ẢNH CỦA BẠN · LƯU CỤC BỘ<\u002Fdiv>\n<\u002Ffooter>\n\n<button id=\"tweaksFab\" style=\"position:fixed;right:20px;bottom:20px;z-index:499;background:var(--ink);color:var(--bg);border:none;border-radius:99px;padding:10px 16px;font-family:'JetBrains Mono';font-size:11px;cursor:pointer;display:none;letter-spacing:0.1em;\">✶ TWEAKS<\u002Fbutton>\n<div class=\"tweaks\" id=\"tweaksPanel\">\n  <h4>Tweaks <button id=\"closeTweaks\">×<\u002Fbutton><\u002Fh4>\n  <div class=\"row\"><span>PALETTE<\u002Fspan>\n    <div class=\"swatches\" id=\"palSw\">\n      <div class=\"sw\" data-p=\"pink\" style=\"background:#ff3d7f\"><\u002Fdiv>\n      <div class=\"sw\" data-p=\"cyber\" style=\"background:#00f0ff\"><\u002Fdiv>\n      <div class=\"sw\" data-p=\"sunset\" style=\"background:#ff6b35\"><\u002Fdiv>\n      <div class=\"sw\" data-p=\"matcha\" style=\"background:#4aa82c\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\"><span>GRAIN<\u002Fspan><div><button class=\"seg\" data-g=\"1\">ON<\u002Fbutton><button class=\"seg\" data-g=\"0\">OFF<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"row\"><span>MODE<\u002Fspan><div><button class=\"seg\" data-m=\"light\">LIGHT<\u002Fbutton><button class=\"seg\" data-m=\"dark\">DARK<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"row\"><span>INTENSITY 3D<\u002Fspan><input type=\"range\" id=\"intensity\" min=\"0.3\" max=\"2\" step=\"0.1\" value=\"1\"><\u002Fdiv>\n  <div class=\"row\"><button class=\"seg\" id=\"clearAll\" style=\"width:100%\">XOÁ TẤT CẢ ẢNH ĐÃ UPLOAD<\u002Fbutton><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* Progress bar */\nconst prog = document.getElementById('progress');\nfunction onScroll() {\n  const h = document.documentElement;\n  prog.style.width = (h.scrollTop / (h.scrollHeight - h.clientHeight) * 100) + '%';\n}\nwindow.addEventListener('scroll', onScroll, { passive: true });\n\n/* Hero 3D tilt on pointer */\nconst heroDrop = document.getElementById('heroDrop');\nconst bigtitle = document.getElementById('bigtitle');\nconst rings = document.querySelectorAll('.hero .ring');\n\nlet mx = 0, my = 0, tx = 0, ty = 0;\nwindow.addEventListener('pointermove', (e) => {\n  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;\n  tx = (e.clientX - cx) / cx;\n  ty = (e.clientY - cy) / cy;\n});\nfunction raf() {\n  mx += (tx - mx) * 0.08;\n  my += (ty - my) * 0.08;\n  const intensity = parseFloat(document.documentElement.dataset.intensity || 1);\n  heroDrop.style.transform = `rotateY(${mx * 18 * intensity}deg) rotateX(${-my * 12 * intensity}deg) translateZ(40px)`;\n\n  const sy = window.scrollY;\n  const t = Math.min(sy / window.innerHeight, 1);\n  bigtitle.style.transform = `translate(-50%, -50%) scale(${1 + t * 0.4})`;\n  bigtitle.style.opacity = String(1 - t * 0.9);\n  rings.forEach((r, i) => {\n    r.style.transform = `translate(-50%, -50%) scale(${1 + t * (0.1 + i * 0.05)}) rotate(${sy * 0.02 * (i + 1)}deg)`;\n    r.style.opacity = String(0.6 - t * 0.4);\n  });\n  if (sy < window.innerHeight) heroDrop.parentElement.style.marginTop = `${-sy * 0.12}px`;\n\n  requestAnimationFrame(raf);\n}\nrequestAnimationFrame(raf);\n\n/* Stats reveal */\nconst statsSec = document.getElementById('stats');\nfunction updateStats() {\n  const r = statsSec.getBoundingClientRect();\n  if (r.top < window.innerHeight * 0.8) {\n    document.querySelectorAll('.stat').forEach(s => {\n      s.classList.add('visible');\n      s.querySelector('.bar i').style.setProperty('--w', s.dataset.w);\n    });\n  }\n}\nwindow.addEventListener('scroll', updateStats, { passive: true });\nupdateStats();\n\n/* Horizontal journey */\nconst jSec = document.getElementById('journey');\nconst jTrack = document.getElementById('jTrack');\nfunction updateJ() {\n  const r = jSec.getBoundingClientRect();\n  const total = jSec.offsetHeight - window.innerHeight;\n  const p = Math.max(0, Math.min(1, -r.top / total));\n  const maxX = Math.max(0, jTrack.scrollWidth - window.innerWidth + 80);\n  jTrack.style.transform = `translateX(${-p * maxX}px)`;\n}\nwindow.addEventListener('scroll', updateJ, { passive: true });\nupdateJ();\n\n/* Profile tilt */\nconst profileDrop = document.querySelector('.profile-drop');\nprofileDrop?.addEventListener('pointermove', (e) => {\n  const r = profileDrop.getBoundingClientRect();\n  const px = (e.clientX - r.left) / r.width - 0.5;\n  const py = (e.clientY - r.top) / r.height - 0.5;\n  profileDrop.style.transform = `rotateY(${px * 14}deg) rotateX(${-py * 10}deg) translateZ(20px)`;\n});\nprofileDrop?.addEventListener('pointerleave', () => profileDrop.style.transform = '');\n\n/* ---------- DROPZONES ---------- */\nconst SAVE_KEY = 'wanpachi_uploads_v1';\nlet saved = {};\ntry { saved = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch (e) {}\n\nfunction saveAll() {\n  try { localStorage.setItem(SAVE_KEY, JSON.stringify(saved)); } catch (e) {}\n}\n\nfunction setImage(drop, dataUrl) {\n  const slot = drop.dataset.slot;\n  // remove old img\n  drop.querySelectorAll('img').forEach(n => n.remove());\n  if (!dataUrl) {\n    drop.classList.remove('has-image');\n    delete saved[slot];\n    saveAll();\n    return;\n  }\n  const img = document.createElement('img');\n  img.src = dataUrl;\n  drop.appendChild(img);\n  drop.classList.add('has-image');\n  saved[slot] = dataUrl;\n  saveAll();\n}\n\nfunction handleFile(drop, file) {\n  if (!file || !file.type.startsWith('image/')) return;\n  const reader = new FileReader();\n  reader.onload = (e) => setImage(drop, e.target.result);\n  reader.readAsDataURL(file);\n}\n\ndocument.querySelectorAll('.drop').forEach(drop => {\n  const input = drop.querySelector('input[type=file]');\n  const clear = drop.querySelector('.clear');\n\n  // restore\n  const slot = drop.dataset.slot;\n  if (slot && saved[slot]) {\n    const img = document.createElement('img');\n    img.src = saved[slot];\n    drop.appendChild(img);\n    drop.classList.add('has-image');\n  }\n\n  drop.addEventListener('click', (e) => {\n    if (e.target === clear) return;\n    input.click();\n  });\n  input.addEventListener('change', (e) => handleFile(drop, e.target.files[0]));\n\n  drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('over'); });\n  drop.addEventListener('dragleave', () => drop.classList.remove('over'));\n  drop.addEventListener('drop', (e) => {\n    e.preventDefault();\n    drop.classList.remove('over');\n    handleFile(drop, e.dataTransfer.files[0]);\n  });\n\n  clear?.addEventListener('click', (e) => {\n    e.stopPropagation();\n    setImage(drop, null);\n  });\n});\n\n/* Paste support: pastes into last-hovered drop */\nlet lastHovered = null;\ndocument.querySelectorAll('.drop').forEach(d => d.addEventListener('pointerenter', () => lastHovered = d));\nwindow.addEventListener('paste', (e) => {\n  if (!lastHovered) return;\n  const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));\n  if (item) handleFile(lastHovered, item.getAsFile());\n});\n\n/* ---------- TWEAKS ---------- */\nconst tweaksPanel = document.getElementById('tweaksPanel');\nconst tweaksFab = document.getElementById('tweaksFab');\ndocument.getElementById('closeTweaks').onclick = () => tweaksPanel.classList.remove('open');\ntweaksFab.onclick = () => tweaksPanel.classList.toggle('open');\n\nfunction applyTweaks(t) {\n  document.documentElement.dataset.palette = t.palette;\n  document.documentElement.dataset.intensity = t.intensity;\n  document.body.classList.toggle('no-grain', !t.grain);\n  if (t.mode === 'dark' && t.palette === 'mustard') {\n    document.documentElement.style.setProperty('--bg', '#1a1208');\n    document.documentElement.style.setProperty('--bg-2', '#2a1f10');\n    document.documentElement.style.setProperty('--ink', '#fdf5e8');\n    document.documentElement.style.setProperty('--ink-2', '#f0d8a8');\n    document.documentElement.style.setProperty('--card', '#261a0e');\n    document.documentElement.style.setProperty('--line', 'rgba(253,245,232,0.1)');\n    document.documentElement.style.setProperty('--muted', '#a88560');\n  } else {\n    ['--bg','--bg-2','--ink','--ink-2','--card','--line','--muted'].forEach(p => document.documentElement.style.removeProperty(p));\n  }\n  document.querySelectorAll('#palSw .sw').forEach(s => s.classList.toggle('active', s.dataset.p === t.palette));\n  document.querySelectorAll('[data-g]').forEach(b => b.classList.toggle('active', (b.dataset.g === '1') === t.grain));\n  document.querySelectorAll('[data-m]').forEach(b => b.classList.toggle('active', b.dataset.m === t.mode));\n  document.getElementById('intensity').value = t.intensity;\n}\napplyTweaks(TWEAKS);\n\nfunction persist() {\n  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: TWEAKS }, '*'); } catch (e) {}\n}\ndocument.querySelectorAll('#palSw .sw').forEach(sw => sw.onclick = () => { TWEAKS.palette = sw.dataset.p; applyTweaks(TWEAKS); persist(); });\ndocument.querySelectorAll('[data-g]').forEach(b => b.onclick = () => { TWEAKS.grain = b.dataset.g === '1'; applyTweaks(TWEAKS); persist(); });\ndocument.querySelectorAll('[data-m]').forEach(b => b.onclick = () => { TWEAKS.mode = b.dataset.m; applyTweaks(TWEAKS); persist(); });\ndocument.getElementById('intensity').oninput = (e) => { TWEAKS.intensity = parseFloat(e.target.value); applyTweaks(TWEAKS); persist(); };\ndocument.getElementById('clearAll').onclick = () => {\n  if (!confirm('Xoá tất cả ảnh đã upload?')) return;\n  saved = {}; saveAll();\n  document.querySelectorAll('.drop').forEach(d => { d.querySelectorAll('img').forEach(n => n.remove()); d.classList.remove('has-image'); });\n};\n\n/* Edit mode handshake */\nwindow.addEventListener('message', (e) => {\n  if (!e.data) return;\n  if (e.data.type === '__activate_edit_mode') { tweaksPanel.classList.add('open'); tweaksFab.style.display = 'block'; }\n  if (e.data.type === '__deactivate_edit_mode') { tweaksPanel.classList.remove('open'); tweaksFab.style.display = 'none'; }\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
